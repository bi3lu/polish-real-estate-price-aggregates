repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types_or: [python, pyi]

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types_or: [python, pyi]

      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
