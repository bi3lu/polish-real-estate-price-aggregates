name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

permissions:
  contents: read

jobs:
  linter:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Run black check
        run: uv run black --check .

      - name: Run isort check
        run: uv run isort --check-only .

      - name: Run mypy
        run: uv run mypy .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=json:coverage.json --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.xml

  coverage-badge:
    name: Coverage Badge
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Build Shields endpoint
        run: |
          mkdir -p coverage-site
          python - <<'PY'
          import json
          from pathlib import Path

          coverage = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          percent = float(coverage["totals"]["percent_covered"])
          rounded = round(percent)

          if percent >= 95:
              color = "brightgreen"
          elif percent >= 90:
              color = "green"
          elif percent >= 80:
              color = "yellowgreen"
          elif percent >= 70:
              color = "yellow"
          elif percent >= 60:
              color = "orange"
          else:
              color = "red"

          badge = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{rounded}%",
              "color": color,
              "cacheSeconds": 300,
          }
          Path("coverage-site/coverage.json").write_text(
              json.dumps(badge, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage-site

      - name: Deploy coverage badge endpoint
        id: deployment
        uses: actions/deploy-pages@v4
